<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeChef — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark:#1a0a00;--maroon:#7a1010;--copper:#b85c2a;--gold:#c9963a;--gold-l:#e8b84b;
  --cream:#faf7f0;--warm:#fffdf7;--muted:#7a6a5a;--border:#e8ddd0;
  --green:#1a5e1a;--green-bg:#e8f5e8;--blue-bg:#e6f1fb;--blue:#185FA5;
  --fd:'Playfair Display',serif;--fb:'DM Sans',sans-serif;
}
body{background:var(--cream);color:var(--dark);font-family:var(--fb);font-weight:300;min-height:100vh;}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--cream);}
.login-card{background:var(--warm);border:1px solid var(--border);border-radius:6px;padding:44px 40px;width:100%;max-width:380px;}
.login-logo{font-family:var(--fd);font-size:30px;font-weight:600;color:var(--dark);text-align:center;margin-bottom:2px;}
.login-logo span{color:var(--copper);}
.login-tagline{text-align:center;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:32px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:3px;background:var(--cream);font-family:var(--fb);font-size:14px;color:var(--dark);outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--copper);}
.login-btn{width:100%;background:var(--maroon);color:#fff;border:none;padding:13px;border-radius:3px;font-family:var(--fb);font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:background .2s;}
.login-btn:hover{background:var(--dark);}
.login-err{font-size:13px;color:#a32d2d;text-align:center;margin-top:10px;display:none;}

#app{display:none;min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:210px;background:var(--dark);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;bottom:0;left:0;}
.sb-logo{padding:22px 18px;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-logo .wc{font-family:var(--fd);font-size:20px;font-weight:600;color:#fff;}
.sb-logo .wc span{color:var(--gold-l);}
.sb-logo .sub{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-top:2px;}
.sb-nav{flex:1;padding:12px 0;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 18px;font-size:13px;color:rgba(255,255,255,.5);cursor:pointer;border:none;background:none;font-family:var(--fb);text-align:left;border-left:2px solid transparent;transition:all .15s;}
.nav-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04);}
.nav-btn.active{color:#fff;border-left-color:var(--gold-l);background:rgba(255,255,255,.06);}
.nav-icon{font-size:14px;width:16px;text-align:center;}
.sb-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);}
.user-email{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{font-size:12px;color:rgba(255,255,255,.3);cursor:pointer;background:none;border:none;font-family:var(--fb);padding:0;transition:color .2s;}
.logout-btn:hover{color:rgba(255,255,255,.65);}

.main{margin-left:210px;padding:30px 32px;flex:1;min-height:100vh;}
.page-hd{margin-bottom:24px;}
.page-title{font-family:var(--fd);font-size:24px;font-weight:600;color:var(--dark);}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px;}

.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.stat{background:var(--warm);border:1px solid var(--border);border-radius:4px;padding:14px 16px;}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:500;margin-bottom:4px;}
.stat-val{font-family:var(--fd);font-size:28px;font-weight:600;color:var(--dark);line-height:1;}
.stat.s-new .stat-val{color:var(--maroon);}
.stat.s-booked .stat-val{color:var(--green);}
.stat.s-done .stat-val{color:var(--copper);}

.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.fbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--warm);font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;font-family:var(--fb);}
.fbtn:hover{border-color:var(--copper);color:var(--copper);}
.fbtn.active{background:var(--maroon);border-color:var(--maroon);color:#fff;}
.search{flex:1;min-width:180px;padding:7px 13px;border:1px solid var(--border);border-radius:3px;font-family:var(--fb);font-size:13px;color:var(--dark);background:var(--warm);outline:none;transition:border-color .2s;}
.search:focus{border-color:var(--copper);}
.refresh{padding:7px 14px;border-radius:3px;border:1px solid var(--border);background:var(--warm);font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--fb);transition:all .15s;}
.refresh:hover{border-color:var(--copper);color:var(--copper);}

.tbl-wrap{background:var(--warm);border:1px solid var(--border);border-radius:4px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--cream);}
th{padding:10px 13px;text-align:left;font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:12px 13px;border-bottom:1px solid var(--border);color:var(--dark);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fdf8f2;}
.td-name{font-weight:500;white-space:nowrap;}
.td-type{font-size:11px;color:var(--muted);margin-top:2px;}
.td-phone a{color:var(--copper);text-decoration:none;}
.td-phone a:hover{text-decoration:underline;}
.td-email{font-size:11px;color:var(--muted);}
.td-svc{font-size:12px;color:var(--muted);max-width:130px;}
.td-msg{font-size:12px;color:var(--muted);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.td-date{font-size:12px;color:var(--muted);white-space:nowrap;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.b-new{background:#fdf0e8;color:#854F0B;}
.b-contacted{background:var(--blue-bg);color:var(--blue);}
.b-booked{background:var(--green-bg);color:var(--green);}
.b-completed{background:#E1F5EE;color:#0F6E56;}
.b-cancelled{background:#f5f5f5;color:#888;}
.status-sel{padding:4px 8px;border:1px solid var(--border);border-radius:3px;font-family:var(--fb);font-size:12px;color:var(--dark);background:var(--warm);cursor:pointer;outline:none;}
.status-sel:focus{border-color:var(--copper);}
.notes-ta{width:100%;min-width:130px;padding:5px 8px;border:1px solid var(--border);border-radius:3px;font-family:var(--fb);font-size:12px;color:var(--dark);background:var(--warm);resize:none;outline:none;transition:border-color .2s;}
.notes-ta:focus{border-color:var(--copper);}
.abtn{padding:4px 10px;border-radius:3px;border:1px solid var(--border);background:none;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--fb);transition:all .15s;margin-right:3px;white-space:nowrap;}
.abtn:hover{border-color:var(--copper);color:var(--copper);}
.abtn.del:hover{border-color:#a32d2d;color:#a32d2d;}
.empty{text-align:center;padding:52px 20px;color:var(--muted);}
.loading-row{text-align:center;padding:36px;color:var(--muted);font-size:13px;}

.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.ov-card{background:var(--warm);border:1px solid var(--border);border-radius:4px;padding:20px 22px;}
.ov-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:500;margin-bottom:6px;}
.ov-val{font-family:var(--fd);font-size:36px;font-weight:600;color:var(--dark);line-height:1;}

.toast{position:fixed;bottom:22px;right:22px;background:var(--dark);color:#fff;padding:11px 18px;border-radius:4px;font-size:13px;z-index:999;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--green);}
.toast.err{background:#a32d2d;}

@media(max-width:700px){
  .sidebar{position:relative;width:100%;height:auto;flex-direction:row;flex-wrap:wrap;}
  .main{margin-left:0;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .overview-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">we<span>chef</span></div>
    <div class="login-tagline">Admin Dashboard</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="lemail" placeholder="wechef2026@gmail.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="lpass" placeholder="Your password" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="lerr">Incorrect email or password.</div>
  </div>
</div>

<div id="app">
  <div class="layout">
    <div class="sidebar">
      <div class="sb-logo">
        <div class="wc">we<span>chef</span></div>
        <div class="sub">Admin panel</div>
      </div>
      <nav class="sb-nav">
        <button class="nav-btn active" id="nav-enq" onclick="showPage('enquiries',this)">
          <span class="nav-icon">📋</span> Enquiries
        </button>
        <button class="nav-btn" id="nav-ov" onclick="showPage('overview',this)">
          <span class="nav-icon">📊</span> Overview
        </button>
      </nav>
      <div class="sb-foot">
        <div class="user-email" id="uEmail"></div>
        <button class="logout-btn" onclick="doLogout()">Sign out</button>
      </div>
    </div>

    <main class="main">
      <!-- ENQUIRIES -->
      <div id="pg-enquiries">
        <div class="page-hd">
          <div class="page-title">Booking enquiries</div>
          <div class="page-sub" id="enqCount">Loading...</div>
        </div>
        <div class="stats-row" id="miniStats"></div>
        <div class="toolbar">
          <button class="fbtn active" onclick="setFilter('all',this)">All</button>
          <button class="fbtn" onclick="setFilter('new',this)">New</button>
          <button class="fbtn" onclick="setFilter('contacted',this)">Contacted</button>
          <button class="fbtn" onclick="setFilter('booked',this)">Booked</button>
          <button class="fbtn" onclick="setFilter('completed',this)">Completed</button>
          <input class="search" id="searchBox" type="text" placeholder="Search name, phone, service…" oninput="renderTable()">
          <button class="refresh" onclick="loadEnquiries()">↻ Refresh</button>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Customer</th><th>Contact</th><th>Service</th><th>Days</th>
                <th>Message</th><th>Date</th><th>Status</th><th>Notes</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="tBody"></tbody>
          </table>
        </div>
      </div>

      <!-- OVERVIEW -->
      <div id="pg-overview" style="display:none;">
        <div class="page-hd">
          <div class="page-title">Overview</div>
          <div class="page-sub">All enquiry stats at a glance</div>
        </div>
        <div class="overview-grid" id="ovGrid"></div>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://wechef-api.onrender.com";
let token = localStorage.getItem("wc_tok") || "";
let allEnq = [];
let curFilter = "all";

// ── Auth ───────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById("lemail").value.trim();
  const pass  = document.getElementById("lpass").value;
  const err   = document.getElementById("lerr");
  err.style.display = "none";
  try {
    const r = await fetch(`${API}/admin/login`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password: pass }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    token = d.token;
    localStorage.setItem("wc_tok", token);
    document.getElementById("uEmail").textContent = d.email;
    bootApp();
  } catch(e) {
    err.style.display = "block";
    err.textContent = e.message || "Login failed";
  }
}

document.getElementById("lpass").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });

function doLogout() {
  localStorage.removeItem("wc_tok");
  token = "";
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

function bootApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadEnquiries();
}

// Auto-login if token still valid
if (token) {
  try {
    const p = JSON.parse(atob(token.split(".")[1]));
    if (p.exp * 1000 > Date.now()) {
      document.getElementById("uEmail").textContent = p.email;
      bootApp();
    } else { localStorage.removeItem("wc_tok"); token = ""; }
  } catch { localStorage.removeItem("wc_tok"); token = ""; }
}

// ── API helper ─────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(`${API}${path}`, {
    ...opts,
    headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}`, ...opts.headers },
  });
  if (r.status === 401) { doLogout(); return null; }
  return r.json();
}

// ── Load data ──────────────────────────────────────────────────
async function loadEnquiries() {
  document.getElementById("tBody").innerHTML = `<tr><td colspan="9" class="loading-row">Loading enquiries…</td></tr>`;
  const data = await api("/admin/enquiries?limit=300");
  if (!data) return;
  allEnq = data;
  document.getElementById("enqCount").textContent = `${data.length} total enquiry${data.length !== 1 ? "ies" : "y"}`;
  renderMini(data);
  renderTable();
}

async function loadOverview() {
  const d = await api("/admin/stats");
  if (!d) return;
  const items = [
    { l:"Total enquiries", v:d.total, c:"" },
    { l:"New (unread)",    v:d.new,   c:"s-new" },
    { l:"Contacted",       v:d.contacted, c:"" },
    { l:"Booked",          v:d.booked,    c:"s-booked" },
    { l:"Completed",       v:d.completed, c:"s-done" },
    { l:"Cancelled",       v:d.cancelled, c:"" },
  ];
  document.getElementById("ovGrid").innerHTML = items.map(i =>
    `<div class="ov-card ${i.c}"><div class="ov-lbl">${i.l}</div><div class="ov-val">${i.v}</div></div>`
  ).join("");
}

// ── Render ─────────────────────────────────────────────────────
function renderMini(data) {
  const c = { total:data.length, new:0, contacted:0, booked:0, completed:0 };
  data.forEach(e => { if(c[e.status]!==undefined) c[e.status]++; });
  document.getElementById("miniStats").innerHTML = [
    { l:"Total", v:c.total, c:"" },{ l:"New", v:c.new, c:"s-new" },
    { l:"Contacted", v:c.contacted, c:"" },{ l:"Booked", v:c.booked, c:"s-booked" },
    { l:"Completed", v:c.completed, c:"s-done" },
  ].map(i=>`<div class="stat ${i.c}"><div class="stat-lbl">${i.l}</div><div class="stat-val">${i.v}</div></div>`).join("");
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderTable();
}

const badgeClass = { new:"b-new", contacted:"b-contacted", booked:"b-booked", completed:"b-completed", cancelled:"b-cancelled" };

function renderTable() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  const rows = allEnq.filter(e => {
    if (curFilter !== "all" && e.status !== curFilter) return false;
    if (!q) return true;
    return (e.name+e.phone+e.email+e.service+e.type).toLowerCase().includes(q);
  });

  if (!rows.length) {
    document.getElementById("tBody").innerHTML = `<tr><td colspan="9"><div class="empty">📭 No enquiries found</div></td></tr>`;
    return;
  }

  document.getElementById("tBody").innerHTML = rows.map(e => {
    const date = e.createdAt ? new Date(e.createdAt).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"}) : "—";
    return `<tr>
      <td><div class="td-name">${x(e.name)}</div><div class="td-type">${x(e.type||"")}</div></td>
      <td class="td-phone">
        <a href="tel:${x(e.phone)}">${x(e.phone)}</a>
        ${e.email?`<div class="td-email">${x(e.email)}</div>`:""}
      </td>
      <td class="td-svc">${x(e.service||"—")}</td>
      <td style="font-size:12px;color:var(--muted);">${x(e.days||"—")}</td>
      <td class="td-msg" title="${x(e.message||"")}">${x(e.message||"—")}</td>
      <td class="td-date">${date}</td>
      <td>
        <select class="status-sel" onchange="updStatus('${e._id}',this.value)">
          ${["new","contacted","booked","completed","cancelled"].map(s=>`<option value="${s}"${e.status===s?" selected":""}>${s[0].toUpperCase()+s.slice(1)}</option>`).join("")}
        </select>
      </td>
      <td><textarea class="notes-ta" rows="2" placeholder="Notes…" onblur="saveNotes('${e._id}',this.value)">${x(e.notes||"")}</textarea></td>
      <td>
        <button class="abtn" onclick="openWA('${x(e.phone)}')">WhatsApp</button>
        <button class="abtn del" onclick="delEnq('${e._id}')">Delete</button>
      </td>
    </tr>`;
  }).join("");
}

function x(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── Actions ────────────────────────────────────────────────────
async function updStatus(id, status) {
  const r = await api(`/admin/enquiries/${id}`, { method:"PATCH", body: JSON.stringify({ status }) });
  if (r?.success) {
    const e = allEnq.find(e => e._id===id);
    if (e) e.status = status;
    renderMini(allEnq);
    toast("Status updated ✓", "ok");
  }
}

async function saveNotes(id, notes) {
  const r = await api(`/admin/enquiries/${id}`, { method:"PATCH", body: JSON.stringify({ notes }) });
  if (r?.success) {
    const e = allEnq.find(e => e._id===id);
    if (e) e.notes = notes;
    toast("Notes saved ✓", "ok");
  }
}

async function delEnq(id) {
  if (!confirm("Delete this enquiry permanently?")) return;
  const r = await api(`/admin/enquiries/${id}`, { method:"DELETE" });
  if (r?.success) {
    allEnq = allEnq.filter(e => e._id !== id);
    renderTable(); renderMini(allEnq);
    toast("Deleted");
  }
}

function openWA(phone) {
  const n = phone.replace(/\D/g,"");
  window.open(`https://wa.me/${n.startsWith("91")?n:"91"+n}`, "_blank");
}

// ── Pages ──────────────────────────────────────────────────────
function showPage(page, btn) {
  document.getElementById("pg-enquiries").style.display = page==="enquiries" ? "block" : "none";
  document.getElementById("pg-overview").style.display  = page==="overview"  ? "block" : "none";
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  if (page==="overview") loadOverview();
}

// ── Toast ──────────────────────────────────────────────────────
let tTimer;
function toast(msg, type="") {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = `toast show ${type}`;
  clearTimeout(tTimer);
  tTimer = setTimeout(() => el.classList.remove("show"), 2500);
}
</script>
</body>
</html>
